[package]
name = "ckpt"
version = "0.1.2"
authors = ["Kashan Ali Khalid <kashankhalid@dnamicro.com>"]
edition = "2021"
description = "Local checkpoint tool using content-addressed storage (hash + manifest). Save, restore, and diff file snapshots without git."
license = "MIT OR Apache-2.0"
# repository = "https://github.com/your-org/crdt-workspace"
keywords = ["checkpoint", "backup", "content-addressed", "snapshot"]
categories = ["development-tools", "command-line-utilities"]
# Publish to dnamicro private registry (https://crates.dnamicro.net)
publish = ["dnamicro"]

[[bin]]
name = "ckpt"
path = "src/main.rs"

[dependencies]
anyhow = "1"
clap = { version = "4", features = ["derive"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sha2 = "0.10"
hex = "0.4"
chrono = { version = "0.4", features = ["serde"] }
