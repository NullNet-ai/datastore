[package]
name = "server"
version = "0.1.0"
edition = "2021"

authors = [
    "Kashan Ali Khalid <kashankhalid@dnamicro.com>"
]

[dependencies]
actix-web = "4.0"
dotenv = "0.15"
diesel = { version = "2.1.0", features = ["postgres", "r2d2", "uuid", "chrono"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
r2d2 = "0.8"
cargo-make = "0.35.6"
hlc = { path = "../../libs/hlc" }
merkle = { path = "../../libs/merkle" }
prost = "0.11"
bytes = "1.0"
log = "0.4"
uuid = "1.16.0"
actix-web-actors = "4.2.0"
actix = "0.13.0"
lazy_static = "1.4.0"
chrono = { version = "0.4", features = ["serde"] }
env_logger = "0.10.0"