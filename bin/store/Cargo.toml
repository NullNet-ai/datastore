[package]
name = "store"
version = "0.1.0"
edition = "2021"

authors = [
    "Kashan Ali Khalid <kashankhalid@dnamicro.com>"
]

[dependencies]
actix-web = "4.3"
diesel = { version = "2.1.0", features = ["postgres", "r2d2", "64-column-tables", "uuid", "chrono", "network-address", "serde_json"] }
diesel-async = { version = "0.3.1", features = ["postgres", "deadpool"] }
deadpool = { version = "0.10", features = ["managed"] }
once_cell = "1.19"
dotenv = "0.15"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
cargo-make = "0.35.6"
uuid = { version = "1.7", features = ["serde", "v4"] }
chrono = { version = "0.4", features = ["serde"] }
futures = "0.3.31"
hlc = { path = "../../libs/hlc" }
merkle = { path = "../../libs/merkle" }
jsonwebtoken = "8.3.0"
log = "0.4"
tokio = { version = "1.44.2", features = ["full"] }
async-stream = "0.3"
reqwest = { version = "0.12.15", features = ["json"] }
env_logger = "0.10.0" 
lazy_static = "1.5.0"
tonic = "0.12.3"
prost = "0.13.5" 
pluralizer = "0.5.0"
regex = "1.11.1"
ipnetwork = { version = "0.20", features = ["serde"] }
tokio-postgres = "0.7.13"
csv = "1"
bytes = "1.10.1"
paste = "1.0"
singularize = "0.1.0"
time = "0.3.41"
actix = "0.13.5"
actix-web-actors = "4.3.1"
socketioxide = { version = "0.9.1", features = ["extensions"] }
tower-http = { version = "0.5", features = ["cors"] }
axum = "0.7"
tower = "0.4"
rpassword = "7.4.0"
argon2 = "0.5.3"
ulid = "1.2.1"
sha2 = "0.10.9"
hex = "0.4.3"
futures-util = "0.3.31"
redis = { version = "0.23.0", features = ["tokio-comp"] }
sha1 = "0.10.6"

[build-dependencies]
tonic-build = "0.12.3"
