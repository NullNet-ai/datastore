[package]
name = "store"
version = "0.1.0"
edition = "2021"

authors = [
    "Kashan Ali Khalid <kashankhalid@dnamicro.com>"
]

[dependencies]
actix-web = "4.3"
diesel = { version = "2.1.0", features = ["postgres", "r2d2", "64-column-tables", "uuid", "chrono"] }
diesel-async = { version = "0.3.1", features = ["postgres", "deadpool"] }
deadpool = { version = "0.10", features = ["managed"] }
once_cell = "1.19"
dotenv = "0.15"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
cargo-make = "0.35.6"
uuid = { version = "1.7", features = ["serde", "v4"] }
chrono = { version = "0.4", features = ["serde"] }
futures = "0.3.31"
hlc = { path = "../../libs/hlc" }
merkle = { path = "../../libs/merkle" }
jsonwebtoken = "8.3.0"
log = "0.4"
tokio = { version = "1.44.2", features = ["full"] }
async-stream = "0.3"
reqwest = { version = "0.12.15", features = ["json"] }
env_logger = "0.10.0" 
lazy_static = "1.5.0"
tonic = "0.12.3"
prost = "0.13.5" 
pluralizer = "0.5.0"
regex = "1.11.1"

[build-dependencies]
tonic-build = "0.12.3"
