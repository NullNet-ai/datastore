[package]
name = "store"
version = "0.2.20"
edition = "2021"
rust-version = "1.88.0"

authors = [
    "Kashan Ali Khalid <kashankhalid@dnamicro.com>",
    "Eriberto Tabada <eribertotabada@dnamicro.com>",
]

[dependencies]
common = { version = "0.1.2", registry = "dnamicro" }
http = "1.3.1"
aws-smithy-http = "0.62.2"
aws-config = { version = "1.1.7", features = ["behavior-version-latest"] }
aws-sdk-s3 = "1.7.0"
aws-smithy-runtime = { version = "1.1.8", features = ["client"] }
rustls = { version = "0.21", features = ["dangerous_configuration"] }
hyper-rustls = { version = "0.24", features = ["http1", "http2"] }
webpki-roots = "0.25"
actix-web = "4.3"
actix-http = "3.0"
actix-files = "0.6"
diesel = { version = "2.1.0", features = ["postgres", "r2d2", "64-column-tables", "uuid", "chrono", "network-address", "serde_json"] }
diesel-async = { version = "0.3.1", features = ["postgres", "deadpool"] }
deadpool = { version = "0.10", features = ["managed"] }
once_cell = "1.19"
dotenv = "0.15"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

uuid = { version = "1.7", features = ["serde", "v4"] }
chrono = { version = "0.4", features = ["serde"] }
futures = "0.3.31"
hlc = { path = "../../libs/hlc" }
merkle = { path = "../../libs/merkle" }
jsonwebtoken = "8.3.0"
log = "0.4.28"
mime_guess = "2.0"
actix-multipart = "0.6"
tokio = { version = "1.44.2", features = ["full"] }
async-stream = "0.3"
reqwest = { version = "0.12.15", features = ["json"] }
env_logger = "0.10.0" 
lazy_static = "1.5.0"
tonic = "0.12.3"
prost = "0.13.5" 
pluralizer = "0.5.0"
regex = "1.11.1"
ipnetwork = { version = "0.20", features = ["serde"] }
thiserror = "1.0"
async-trait = "0.1"
const_format = "0.2"
tokio-postgres = { version = "0.7.13", features = ["with-uuid-1", "with-chrono-0_4", "with-serde_json-1"] }
base64 = "0.22"
maxminddb = "0.24"
csv = "1"
bytes = "1.10.1"
paste = "1.0"
singularize = "0.1.0"
time = "0.3.41"
actix = "0.13.5"
actix-web-actors = "4.3.1"
socketioxide = { version = "0.9.1", features = ["extensions"] }
tower-http = { version = "0.5", features = ["cors"] }
axum = "0.7"
tower = "0.4"
rpassword = "7.4.0"
argon2 = "0.5.3"
ulid = "1.2.1"
sha2 = "0.10.9"
hex = "0.4.3"
futures-util = "0.3.31"
redis = { version = "0.23.0", features = ["tokio-comp"] }
sha1 = "0.10.6"
woothee = "0.13.0"


[build-dependencies]
tonic-build = "0.12.3"