networks:
  internal:
  frontend:
    external: true

services:
  timescaledb:
    image: timescale/timescaledb:latest-pg15
    container_name: timescaledb
    ports:
      - "5440:5432"
    networks:
      - internal
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: postgres
    restart: always

  redis:
    image: redis:7
    container_name: redis
    ports:
      - "6390:6379" # Host:Container mapping
    networks:
      - internal
    restart: unless-stopped

  # Main store application
  store:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: crdt-store
    depends_on:
      - timescaledb
      - redis
    env_file:
      - ../../.env-store
    ports:
      - "5000:5000"
    networks:
      - internal
