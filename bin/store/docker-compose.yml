version: '3.9'

networks:
  internal:
  frontend: 
    external: true

services:
  timescaledb:
    image: timescale/timescaledb:latest-pg14
    container_name: timescaledb
    ports:
      - '5432:5432'
    networks:
      - internal
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: nullnet
    restart: always

  redis:
    image: redis:7
    container_name: redis
    ports:
      - '6380:6379'  # Host:Container mapping
    networks:
      - internal
    restart: unless-stopped
