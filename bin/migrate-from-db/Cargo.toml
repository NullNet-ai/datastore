[package]
name = "migrate-from-db"
version = "0.1.0"
edition = "2021"
description = "Migrate data from a PostgreSQL database into the store API (create route)"

[[bin]]
name = "migrate-from-db"
path = "src/main.rs"

[[bin]]
name = "order-tables"
path = "src/bin/order_tables.rs"

[dependencies]
tokio = { version = "1", features = ["full"] }
tokio-postgres = { version = "0.7", features = ["with-serde_json-1"] }
reqwest = { version = "0.12", features = ["json"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1.0"
dotenv = "0.15"
env_logger = "0.10"
chrono = "0.4"
prometheus = "0.13"
