# Prometheus config for migrate-from-db metrics.
# Scrapes the migration binary when it runs with MIGRATE_METRICS_PORT=9090.
# When running migration on the host, Prometheus in Docker reaches it via host.docker.internal.

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "migrate-from-db"
    static_configs:
      # Migration binary on host (Mac/Windows: host.docker.internal; Linux: use extra_hosts in compose)
      - targets: ["host.docker.internal:9090"]
    scrape_interval: 5s
    scrape_timeout: 5s

  # Optional: scrape Prometheus itself (inside container it listens on 9090)
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
