[package]
name = "counter-service"
version = "0.1.0"
edition = "2021"

[lib]
name = "counter_service"
path = "src/lib.rs"

[[bin]]
name = "counter-service"
path = "src/main.rs"

[dependencies]
tonic = "0.12"
prost = "0.13"
tokio = { version = "1", features = ["full"] }
redis = { version = "0.26", features = ["tokio-comp"] }
deadpool-redis = "0.16"
log = "0.4"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
dotenv = "0.15"
thiserror = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
axum = { version = "0.7", features = ["json"] }
tower = "0.4"

[build-dependencies]
tonic-build = "0.12"
