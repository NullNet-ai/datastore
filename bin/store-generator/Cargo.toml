[package]
name = "store-generator"
version = "0.1.7"
authors = ["Kashan Ali Khalid <kashankhalid@dnamicro.com>"]
edition = "2021"
description = "Standalone code generator for store schema, models, migrations, proto, table_enum, and grpc_controller"
license = "MIT OR Apache-2.0"
# repository = "https://github.com/your-org/crdt-workspace"
keywords = ["codegen", "diesel", "schema", "migrations"]
categories = ["development-tools"]
# Publish to dnamicro private registry (https://crates.dnamicro.net)
publish = ["dnamicro"]

[dependencies]
chrono = "0.4"
env_logger = "0.11"
lazy_static = "1.5"
log = "0.4"
regex = "1.11"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
singularize = "0.1.0"
once_cell = "1.19"
toml = "0.8"
